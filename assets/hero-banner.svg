<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#008f23"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff41" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- Global sweeping scan line -->
  <rect x="0" width="1200" height="3" fill="#00ff41" opacity="0.18">
    <animate attributeName="y" values="0;320;0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Matrix rain columns -->
  <g font-family="monospace" font-size="14" fill="#00ff41" opacity="0.4">
    <text x="50" y="0">
      <tspan x="50" dy="20">0</tspan><tspan x="50" dy="20">1</tspan><tspan x="50" dy="20">0</tspan><tspan x="50" dy="20">1</tspan><tspan x="50" dy="20">1</tspan><tspan x="50" dy="20">0</tspan><tspan x="50" dy="20">1</tspan>
      <animate attributeName="y" from="-100" to="320" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="120" y="0">
      <tspan x="120" dy="20">1</tspan><tspan x="120" dy="20">0</tspan><tspan x="120" dy="20">1</tspan><tspan x="120" dy="20">1</tspan><tspan x="120" dy="20">0</tspan><tspan x="120" dy="20">0</tspan><tspan x="120" dy="20">1</tspan>
      <animate attributeName="y" from="-150" to="320" dur="5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    </text>
    <text x="200" y="0">
      <tspan x="200" dy="20">0</tspan><tspan x="200" dy="20">1</tspan><tspan x="200" dy="20">1</tspan><tspan x="200" dy="20">0</tspan><tspan x="200" dy="20">1</tspan><tspan x="200" dy="20">0</tspan>
      <animate attributeName="y" from="-80" to="320" dur="3.5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="3.5s" begin="1s" repeatCount="indefinite"/>
    </text>
    <text x="980" y="0">
      <tspan x="980" dy="20">1</tspan><tspan x="980" dy="20">1</tspan><tspan x="980" dy="20">0</tspan><tspan x="980" dy="20">1</tspan><tspan x="980" dy="20">0</tspan><tspan x="980" dy="20">1</tspan>
      <animate attributeName="y" from="-100" to="320" dur="4.5s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="4.5s" begin="0.3s" repeatCount="indefinite"/>
    </text>
    <text x="1060" y="0">
      <tspan x="1060" dy="20">0</tspan><tspan x="1060" dy="20">0</tspan><tspan x="1060" dy="20">1</tspan><tspan x="1060" dy="20">0</tspan><tspan x="1060" dy="20">1</tspan><tspan x="1060" dy="20">1</tspan>
      <animate attributeName="y" from="-120" to="320" dur="5s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="5s" begin="1.5s" repeatCount="indefinite"/>
    </text>
    <text x="1130" y="0">
      <tspan x="1130" dy="20">1</tspan><tspan x="1130" dy="20">0</tspan><tspan x="1130" dy="20">1</tspan><tspan x="1130" dy="20">1</tspan><tspan x="1130" dy="20">0</tspan>
      <animate attributeName="y" from="-90" to="320" dur="3.8s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="3.8s" begin="0.8s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Shield with pulsing glow -->
  <g transform="translate(600, 160)" filter="url(#strongGlow)">
    <path d="M 0 -70 L 50 -50 L 50 10 Q 50 50 0 70 Q -50 50 -50 10 L -50 -50 Z" 
          fill="url(#shieldGrad)" opacity="0.95">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 0 -70 L 50 -50 L 50 10 Q 50 50 0 70 Q -50 50 -50 10 L -50 -50 Z" 
          fill="none" stroke="#00ff41" stroke-width="2"/>
    <!-- Lock icon inside shield -->
    <rect x="-15" y="-10" width="30" height="25" rx="2" fill="#0d1117" stroke="#00ff41" stroke-width="1.5"/>
    <path d="M -10 -10 L -10 -22 Q -10 -32 0 -32 Q 10 -32 10 -22 L 10 -10" 
          fill="none" stroke="#00ff41" stroke-width="2"/>
    <circle cx="0" cy="2" r="3" fill="#00ff41"/>
    <line x1="0" y1="2" x2="0" y2="8" stroke="#00ff41" stroke-width="2"/>
  </g>

  <!-- Pulsing rings around shield -->
  <g transform="translate(600, 160)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0">
      <animate attributeName="r" from="80" to="180" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0">
      <animate attributeName="r" from="80" to="180" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Name title -->
  <g font-family="'Courier New', monospace" text-anchor="middle">
    <text x="600" y="55" font-size="14" fill="#00ff41" opacity="0.6" letter-spacing="4">
      [ SYSTEM ONLINE ]
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Corner brackets -->
  <g stroke="#00ff41" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 20 20 L 20 50 M 20 20 L 50 20"/>
    <path d="M 1180 20 L 1180 50 M 1180 20 L 1150 20"/>
    <path d="M 20 300 L 20 270 M 20 300 L 50 300"/>
    <path d="M 1180 300 L 1180 270 M 1180 300 L 1150 300"/>
  </g>

  <!-- Bottom scan line effect -->
  <rect x="0" y="0" width="1200" height="2" fill="#00ff41" opacity="0.5">
    <animate attributeName="y" from="0" to="320" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
