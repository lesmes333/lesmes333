<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0a1a0e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="50%" stop-color="#00ff41" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff41"/>
    </linearGradient>
    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="cardGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00ff41" stroke-width="0.2" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background card -->
  <rect x="10" y="10" width="880" height="300" rx="14" fill="url(#cardGrad)" stroke="url(#borderGrad)" stroke-width="2"/>
  <rect x="10" y="10" width="880" height="300" rx="14" fill="url(#cardGrid)"/>

  <!-- Animated scan line -->
  <rect x="10" y="10" width="880" height="2" fill="#00ff41" opacity="0.7">
    <animate attributeName="y" from="10" to="308" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Top label -->
  <g font-family="'Courier New', monospace">
    <text x="40" y="50" font-size="12" fill="#7d8590" letter-spacing="2">// LET'S CONNECT</text>
    <circle cx="850" cy="46" r="6" fill="#00ff41">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="810" y="50" font-size="11" fill="#00ff41" text-anchor="end">ONLINE</text>
  </g>

  <!-- Main heading -->
  <g font-family="'Courier New', monospace" text-anchor="middle">
    <text x="450" y="105" font-size="36" font-weight="bold" fill="#00ff41" filter="url(#cardGlow)" letter-spacing="3">
      OPEN TO WORK
    </text>
    <text x="450" y="138" font-size="16" fill="#c9d1d9" letter-spacing="6">
      ▸ CYBERSECURITY ANALYST ◂
    </text>
  </g>

  <!-- Divider -->
  <line x1="200" y1="160" x2="700" y2="160" stroke="#00ff41" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- Contact methods -->
  <g font-family="'Courier New', monospace">
    
    <!-- Email -->
    <g transform="translate(60, 195)">
      <rect width="380" height="50" rx="8" fill="#161b22" stroke="#00ff41" stroke-width="1" opacity="0.95"/>
      <circle cx="30" cy="25" r="14" fill="#0d1117" stroke="#00ff41" stroke-width="1.5"/>
      <path d="M 22 21 L 30 28 L 38 21 M 22 21 L 22 29 L 38 29 L 38 21" 
            fill="none" stroke="#00ff41" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="55" y="20" font-size="10" fill="#7d8590" letter-spacing="2">EMAIL</text>
      <text x="55" y="38" font-size="14" fill="#e6edf3" font-weight="bold">lesmes.luisber@gmail.com</text>
    </g>

    <!-- LinkedIn -->
    <g transform="translate(460, 195)">
      <rect width="380" height="50" rx="8" fill="#161b22" stroke="#00ff41" stroke-width="1" opacity="0.95"/>
      <circle cx="30" cy="25" r="14" fill="#0d1117" stroke="#00ff41" stroke-width="1.5"/>
      <text x="30" y="30" font-size="14" font-weight="bold" fill="#00ff41" text-anchor="middle" font-family="Arial">in</text>
      <text x="55" y="20" font-size="10" fill="#7d8590" letter-spacing="2">LINKEDIN</text>
      <text x="55" y="38" font-size="14" fill="#e6edf3" font-weight="bold">Luis Alberto Lesmes Hernández</text>
    </g>

    <!-- Location / Availability -->
    <g transform="translate(60, 260)">
      <rect width="380" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="20" y="25" font-size="12" fill="#7d8590">📍 LOCATION</text>
      <text x="370" y="25" font-size="13" fill="#e6edf3" text-anchor="end" font-weight="bold">Palencia, España</text>
    </g>

    <g transform="translate(460, 260)">
      <rect width="380" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="20" y="25" font-size="12" fill="#7d8590">🚀 AVAILABILITY</text>
      <text x="370" y="25" font-size="13" fill="#00ff41" text-anchor="end" font-weight="bold">Inmediata · Movilidad ✓</text>
    </g>
  </g>

  <!-- Corner brackets (decorative) -->
  <g stroke="#00ff41" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 25 25 L 25 50 M 25 25 L 50 25"/>
    <path d="M 875 25 L 875 50 M 875 25 L 850 25"/>
    <path d="M 25 295 L 25 270 M 25 295 L 50 295"/>
    <path d="M 875 295 L 875 270 M 875 295 L 850 295"/>
  </g>
</svg>
