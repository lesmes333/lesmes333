<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3a3a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff3a3a" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a8eff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3a8eff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="redGlow"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blueGlow"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="greenGlow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="900" height="320" fill="#0d1117"/>

  <!-- OFFENSIVE COLUMN -->
  <g transform="translate(20, 20)">
    <rect width="270" height="280" rx="10" fill="url(#redGrad)" stroke="#ff3a3a" stroke-width="1.5" opacity="0.9"/>
    <circle cx="30" cy="35" r="7" fill="#ff3a3a">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="35" r="11" fill="none" stroke="#ff3a3a" stroke-width="1" opacity="0.5">
      <animate attributeName="r" from="7" to="16" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="50" y="42" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#ff3a3a" letter-spacing="2">OFFENSIVE</text>
    <line x1="20" y1="60" x2="250" y2="60" stroke="#ff3a3a" stroke-width="0.5" opacity="0.4"/>
    
    <g font-family="'Courier New', monospace" font-size="13" fill="#e6edf3">
      <text x="20" y="90">▸ Pentesting Web</text>
      <text x="20" y="115">▸ API Security Audit</text>
      <text x="20" y="140">▸ Phishing Campaigns</text>
      <text x="20" y="165">▸ CVE Research &amp; PoC</text>
      <text x="20" y="190">▸ Network Analysis</text>
      <text x="20" y="215">▸ Vulnerability Hunting</text>
      <text x="20" y="240">▸ OSINT &amp; Recon</text>
    </g>
    <text x="20" y="268" font-family="'Courier New', monospace" font-size="10" fill="#ff3a3a" opacity="0.6">[ STATUS: ENGAGED ]</text>
  </g>

  <!-- DEFENSIVE COLUMN -->
  <g transform="translate(315, 20)">
    <rect width="270" height="280" rx="10" fill="url(#blueGrad)" stroke="#3a8eff" stroke-width="1.5" opacity="0.9"/>
    <circle cx="30" cy="35" r="7" fill="#3a8eff">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="35" r="11" fill="none" stroke="#3a8eff" stroke-width="1" opacity="0.5">
      <animate attributeName="r" from="7" to="16" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <text x="50" y="42" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#3a8eff" letter-spacing="2">DEFENSIVE</text>
    <line x1="20" y1="60" x2="250" y2="60" stroke="#3a8eff" stroke-width="0.5" opacity="0.4"/>
    
    <g font-family="'Courier New', monospace" font-size="13" fill="#e6edf3">
      <text x="20" y="90">▸ Vuln Management</text>
      <text x="20" y="115">▸ Microsoft Defender</text>
      <text x="20" y="140">▸ Purview DLP</text>
      <text x="20" y="165">▸ Threat Intelligence</text>
      <text x="20" y="190">▸ Incident Response</text>
      <text x="20" y="215">▸ Phishing Simulation</text>
      <text x="20" y="240">▸ Linux Hardening</text>
    </g>
    <text x="20" y="268" font-family="'Courier New', monospace" font-size="10" fill="#3a8eff" opacity="0.6">[ STATUS: MONITORING ]</text>
  </g>

  <!-- INFRASTRUCTURE COLUMN -->
  <g transform="translate(610, 20)">
    <rect width="270" height="280" rx="10" fill="url(#greenGrad)" stroke="#00ff41" stroke-width="1.5" opacity="0.9"/>
    <circle cx="30" cy="35" r="7" fill="#00ff41">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="35" r="11" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.5">
      <animate attributeName="r" from="7" to="16" dur="1.5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <text x="50" y="42" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#00ff41" letter-spacing="2">INFRASTRUCTURE</text>
    <line x1="20" y1="60" x2="250" y2="60" stroke="#00ff41" stroke-width="0.5" opacity="0.4"/>
    
    <g font-family="'Courier New', monospace" font-size="13" fill="#e6edf3">
      <text x="20" y="90">▸ Linux Server Admin</text>
      <text x="20" y="115">▸ Docker &amp; Compose</text>
      <text x="20" y="140">▸ Proxmox VE</text>
      <text x="20" y="165">▸ Google Cloud</text>
      <text x="20" y="190">▸ Active Directory</text>
      <text x="20" y="215">▸ PKI &amp; Cryptography</text>
      <text x="20" y="240">▸ Reverse Proxy / VPN</text>
    </g>
    <text x="20" y="268" font-family="'Courier New', monospace" font-size="10" fill="#00ff41" opacity="0.6">[ STATUS: OPERATIONAL ]</text>
  </g>
</svg>
