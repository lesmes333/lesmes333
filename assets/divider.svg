<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 30" width="1200" height="30">
  <defs>
    <linearGradient id="dgrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff41" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dpulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
    <filter id="dglow"><feGaussianBlur stdDeviation="1.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <line x1="0" y1="15" x2="1200" y2="15" stroke="url(#dgrad)" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- Traveling data packet (glow halo) -->
  <circle cy="15" r="20" fill="url(#dpulse)">
    <animate attributeName="cx" values="-40;1240" dur="6s" repeatCount="indefinite"/>
  </circle>
  <!-- Traveling data packet (core) -->
  <circle cy="15" r="3.5" fill="#00ff41" filter="url(#dglow)">
    <animate attributeName="cx" values="-40;1240" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Center node -->
  <circle cx="600" cy="15" r="4" fill="#00ff41" filter="url(#dglow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="15" r="2" fill="#00ff41" opacity="0.5"/>
  <circle cx="620" cy="15" r="2" fill="#00ff41" opacity="0.5"/>
</svg>
