<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0a1a0e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1.5"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="200" fill="url(#footerBg)"/>

  <!-- Sweeping scan line -->
  <rect x="0" width="1200" height="2" fill="#00ff41" opacity="0.25">
    <animate attributeName="y" values="0;200;0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Top accent line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ff41" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Terminal prompt -->
  <g font-family="'Courier New', monospace" text-anchor="middle">
    <text x="600" y="50" font-size="14" fill="#00ff41" opacity="0.8">
      <tspan fill="#7d8590">root@lesmes:~$</tspan> echo "thanks for visiting"
    </text>
    
    <text x="600" y="95" font-size="18" fill="#00ff41" filter="url(#textGlow)">
      "Security is not a product, but a process."
    </text>
    <text x="600" y="118" font-size="13" fill="#7d8590" font-style="italic">
      — Bruce Schneier
    </text>
    
    <text x="600" y="160" font-size="12" fill="#00ff41" opacity="0.6">
      [ Always learning · Always defending · Always curious ]
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Decorative brackets -->
  <g stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M 50 50 L 50 150"/>
    <path d="M 50 50 L 80 50"/>
    <path d="M 50 150 L 80 150"/>
    <path d="M 1150 50 L 1150 150"/>
    <path d="M 1150 50 L 1120 50"/>
    <path d="M 1150 150 L 1120 150"/>
  </g>
  
  <!-- Blinking cursor -->
  <rect x="850" y="38" width="10" height="16" fill="#00ff41">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
